name: Build & Deploy Update Tracker

on:
  push:
    branches: [ main ]
    paths:
      - 'SA-Update Tracker.xlsx'
      - 'index.html'
      - 'style.css'
      - 'app.js'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read        # we no longer push to the repo
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Convert Excel to JSON
        run: |
          python - << 'PY'
          import pandas as pd, json, os
          src = 'SA-Update Tracker.xlsx'
          if not os.path.exists(src):
            raise SystemExit(f"Missing Excel file: {src}")
          df = pd.read_excel(src, engine='openpyxl')
          # Normalize any date-like columns to ISO yyyy-mm-dd
          for col in df.columns:
            if 'date' in col.lower():
              df[col] = pd.to_datetime(df[col], errors='coerce').dt.strftime('%Y-%m-%d')
          records = json.loads(df.fillna('').to_json(orient='records'))
          with open('data.json', 'w', encoding='utf-8') as f:
            json.dump(records, f, ensure_ascii=False, indent=2)
          PY

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp -f index.html style.css app.js data.json _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
