name: Build data.json from Excel
on:
  push:
    branches: [ main ]
    paths:
      - 'SA-Update Tracker.xlsx'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Convert Excel to JSON
        run: |
          python - << 'PY'
          import pandas as pd, json
          df = pd.read_excel('SA-Update Tracker.xlsx', engine='openpyxl')

          # Convert dates
          for col in df.columns:
            if 'date' in col.lower():
              df[col] = pd.to_datetime(df[col], errors='coerce').dt.strftime('%Y-%m-%d')

          records = json.loads(df.fillna('').to_json(orient='records'))

          with open('data.json', 'w', encoding='utf-8') as f:
            json.dump(records, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit & push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update data.json from Excel" || echo "No changes"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: .
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
