name: Build data.json from Excel

on:
  push:
    branches: [ main ]
    paths:
      - 'SA-Update Tracker.xlsx'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write          # allow commit of data.json
  pages: write             # allow Pages deployment
  id-token: write          # required by deploy-pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Convert Excel to JSON
        run: |
          python - << 'PY'
          import pandas as pd, json
          df = pd.read_excel('SA-Update Tracker.xlsx', engine='openpyxl')
          # Standardize date-like columns to ISO yyyy-mm-dd
          for col in df.columns:
            if 'date' in col.lower():
              df[col] = pd.to_datetime(df[col], errors='coerce').dt.strftime('%Y-%m-%d')
          # Replace NaN with empty strings for clean JSON
          records = json.loads(df.fillna('').to_json(orient='records'))
          with open('data.json', 'w', encoding='utf-8') as f:
            json.dump(records, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit & push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update data.json from Excel" || echo "No changes"
          git push

      - name: Prepare static site files for Pages
        run: |
          # Ensure index.html, style.css, app.js and data.json are in the root of the artifact
          mkdir -p ./_site
          cp -f index.html style.css app.js data.json ./_site/ 2>/dev/null || true

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
