<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OTC Update Tracker</title>

  <!-- ✅ Correct CSS tag (this was missing before) -->
  style.css?v=9
</head>
<body>
  <header class="topbar">
    <h1>OTC Update Tracker</h1>
    <div class="kpis">
      <div class="kpi"><span id="kpi-total">0</span><label>Total</label></div>
      <div class="kpi"><span id="kpi-visible">0</span><label>Visible</label></div>
    </div>
  </header>

  <section class="filters">
    <div class="filter">
      <label for="district">District</label>
      <select id="district"><option value="">All</option></select>
    </div>
    <div class="filter">
      <label for="customer">Customer</label>
      <select id="customer"><option value="">All</option></select>
    </div>
    <div class="filter">
      <label for="person">Responsible</label>
      <select id="person"><option value="">All</option></select>
    </div>
    <div class="filter search">
      <label for="search">Search</label>
      <input id="search" type="text" placeholder="Search across all columns…" />
    </div>
    <div class="actions">
      <button id="reset">Reset</button>
      <button id="download">Download visible (.csv)</button>
    </div>
  </section>

  <section class="table-wrap">
    <table id="grid" aria-label="Update list">
      <thead id="grid-head"></thead>
      <tbody id="grid-body"></tbody>
    </table>
  </section>

  <footer class="foot">
    <span>Built for BSNA OTC Billing • v1</span>
    <span>Tip: Use dropdowns + search; your last filters are remembered.</span>
  </footer>

  <!-- Optional: a small alert zone for runtime errors -->
  <div id="app-alert" style="display:none; margin:12px 20px; padding:10px; color:#fff; background:#b91c1c; border-radius:8px;"></div>

  <!-- ✅ Correct JS tag (this was missing before) -->
  app.js?v=9</script>
</body>
</html>
